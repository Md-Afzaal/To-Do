{% extends "base.html" %} {% block head %}
<title>Edit Task</title>
{% endblock %} {% block body %}

<div class="container">
  <div class="content">
    <h1>Edit Task</h1>
    <form action="/edit/{{ task.id }}" method="POST">
      <input
        type="text"
        name="content"
        id="content"
        value="{{ task.content }}"
      />
      <br /><br />

      <!-- STATUS -->
      <label>
        <input
          type="checkbox"
          name="completed"
          {%
          if
          task.completed
          %}checked{%
          endif
          %}
        />
        {% if task.completed %} Completed {% else %} Completed {% endif %}
      </label>

      <br /><br />

      <input type="submit" value="Update Task" id="btn_update" />
    </form>
  </div>
</div>
{% endblock %}
